name: Compile UAC Method 59 (Single C File - Fresh Build)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # Manual trigger button

jobs:
  compile:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild (enables cl.exe from Visual Studio 2022)
      uses: microsoft/setup-msbuild@v2

    - name: Compile uac_method59.c to exe (minimal flags for smaller signature)
      shell: cmd
      run: |
        cl /O2 /MT /EHsc /Fe:uac_method59.exe uac_method59.c

    - name: Upload fresh uac_method59.exe artifact
      uses: actions/upload-artifact@v4
      with:
        name: uac_method59-exe
        path: uac_method59.exe
        if-no-files-found: error
