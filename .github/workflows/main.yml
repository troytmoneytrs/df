name: Compile UAC Method 34 (25H2 Compatible)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile Method 34
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" > nul
          cl /O2 /MT /EHsc /TP /DUNICODE /D_UNICODE /Fe:uac_method34.exe uac_method59.c /link ole32.lib shell32.lib advapi32.lib user32.lib

      - name: Upload fresh uac_method34.exe
        uses: actions/upload-artifact@v4
        with:
          name: uac_method34-exe
          path: uac_method34.exe
          if-no-files-found: error
